# GitHub Pages deployment
# FaithfulBooks Publishing — Adam Joseph Hanrahan Author Site
#
# Triggers on every push to main (or master).
# No build step needed — the site is pure static HTML/CSS/JS.
# Deploys from the repository root.

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site to Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Serve everything from the repo root
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
