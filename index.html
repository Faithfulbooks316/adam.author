<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Index HTML Editor</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      background: #111827;
      color: #f9fafb;
    }

    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #374151;
      background: #1f2937;
    }

    h1 {
      margin: 0 0 0.25rem;
      font-size: 1.25rem;
    }

    p {
      margin: 0;
      color: #d1d5db;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    textarea {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      border: 0;
      padding: 1.25rem;
      resize: none;
      font: 14px/1.5 Consolas, Monaco, monospace;
      background: #030712;
      color: #f9fafb;
    }

    textarea:focus {
      outline: 2px solid #3b82f6;
      outline-offset: -2px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Paste your code here</h1>
    <p>This page gives you a full-window editor for long code snippets that need to go into index.html.</p>
  </header>
  <label class="sr-only" for="html-code-editor">HTML code editor</label>
  <textarea id="html-code-editor" spellcheck="false" aria-label="HTML code editor"><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your page title</title>
</head>
<body>
  <!-- Replace this template with the code you want in index.html -->
</body>
</html></textarea>
</body>
</html>
